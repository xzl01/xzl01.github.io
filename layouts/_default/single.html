{{ define "main" }}
<section class="single-layout">
    <article class="single-post">
        <div class="post-meta">
            <span>{{ .Date.Format "2006-01-02" }}</span>
            {{ if .Params.tags }}
            <span>·</span>
            <span>{{ len .Params.tags }} 个标签</span>
            {{ end }}
        </div>

        {{ with .Params.tags }}
        <div class="tag-list post-tags">
            {{ range . }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}

        <div class="post-content">
            {{ .Content }}
        </div>
    </article>

    {{ if .TableOfContents }}
    <aside class="post-toc">
        <div class="post-toc-inner">
            <p class="post-toc-title">目录</p>
            {{ .TableOfContents }}
        </div>
    </aside>
    {{ end }}
</section>
{{ end }}
